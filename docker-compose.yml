version: "3.8"

services:
  app:
    build: .
    expose:
      - "8000"
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Shanghai
      - REFRESH_HOUR=9
      - REFRESH_MINUTE=0

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app-data:
